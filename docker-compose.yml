volumes:
    postgres-db-data:

services:
    postgresql-db:
      image: postgres
      volumes:
          - postgres-db-data:/var/lib/postgresql
      ports:
        - ${POSTGRES_PORT}:${POSTGRES_DOCKER_PORT}
      environment:
        - POSTGRES_DB=${POSTGRES_DB}
        - POSTGRES_USER=${POSTGRES_USER}
        - POSTGRES_PASSWORD=${POSTGRES_PASS}
        - ALLOW_IP_RANGE=${ALLOW_IP_RANGE}
        - FORCE_SSL=FALSE
        - TZ=Asia/Hong_Kong
      restart: on-failure
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
        interval: 10s
        timeout: 5s
        retries: 5

    mqtt-broker:
      image: eclipse-mosquitto
      volumes:
        - ./mosquitto:/mosquitto
        - ./mosquitto/data:/mosquitto/data
        - ./mosquitto/log:/mosquitto/log
      ports:
        - ${MQTT_PORT}:${MQTT_DOCKER_PORT}
      environment:
        - MQTT_USER=${MQTT_USER:-temptrack}
        - MQTT_PASSWORD=${MQTT_PASSWORD:-changeme_mqtt_please_rotate}
      entrypoint: ["/bin/sh", "/mosquitto/config/docker-entrypoint.sh"]
      restart: on-failure
      healthcheck:
        test: ["CMD-SHELL", "mosquitto_sub -h 127.0.0.1 -p 1883 -t '$$SYS/broker/version' -C 1 -W 3"]
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 15s

    app:
      build:
        context: .
        dockerfile: nodeapp/Dockerfile
      env_file: ./.env
      environment:
        - TZ=Asia/Hong_Kong
        - MQTT_USER=${MQTT_USER:-temptrack}
        - MQTT_PASSWORD=${MQTT_PASSWORD:-changeme_mqtt_please_rotate}
      command: >
        sh -c "
          cd /frontend && npm install && VITE_BUILD_OUT_DIR=../app/public npm run build &&
          cd /app && npm install &&
          chmod +x bin/ensure-runtime-env.sh 2>/dev/null || true &&
          . ./bin/ensure-runtime-env.sh &&
          npx prisma migrate deploy &&
          npm run prod
        "
      restart: on-failure
      ports:
        - ${NODE_PORT}:${NODE_DOCKER_PORT}
      working_dir: /app
      volumes:
        - ./nodeapp:/app
        - ./nodeapp/node_modules:/app/node_modules
        - ./frontend:/frontend
        - /frontend/node_modules
      depends_on:
        postgresql-db:
          condition: service_healthy
        mqtt-broker:
          condition: service_healthy
      stdin_open: true
      tty: true