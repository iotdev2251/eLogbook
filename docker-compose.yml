volumes:
    postgres-db-data:

services:
    postgresql-db:
      image: postgres:14-bullseye
      volumes:
          - postgres-db-data:/var/lib/postgresql
      ports:
        - ${POSTGRES_PORT}:${POSTGRES_DOCKER_PORT}
      environment:
        - POSTGRES_DB=${POSTGRES_DB}
        - POSTGRES_USER=${POSTGRES_USER}
        - POSTGRES_PASSWORD=${POSTGRES_PASS}
        - ALLOW_IP_RANGE=${ALLOW_IP_RANGE}
        - FORCE_SSL=FALSE
        - TZ=Asia/Hong_Kong
      restart: on-failure
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
        interval: 10s
        timeout: 5s
        retries: 5

    mqtt-broker:
      image: eclipse-mosquitto:2
      volumes:
        - ./mosquitto:/mosquitto
        - ./mosquitto/data:/mosquitto/data
        - ./mosquitto/log:/mosquitto/log
      ports:
        - ${MQTT_PORT}:${MQTT_DOCKER_PORT}
      entrypoint: ["/bin/sh", "/mosquitto/config/docker-entrypoint.sh"]
      restart: unless-stopped
      healthcheck:
        test: ["CMD-SHELL", "mosquitto_pub -h 127.0.0.1 -p 1883 -t healthcheck/ping -m 1 -q 0"]
        interval: 15s
        timeout: 5s
        retries: 3
        start_period: 20s

    app:
      build:
        context: .
        dockerfile: nodeapp/Dockerfile
      env_file: ./.env
      environment:
        - TZ=Asia/Hong_Kong
        - MQTT_USER=${MQTT_USER:-temptrack}
        - MQTT_PASSWORD=${MQTT_PASSWORD:-changeme_mqtt_please_rotate}
        - FORCE_FRONTEND_BUILD=${FORCE_FRONTEND_BUILD:-0}
        - USE_HTTP=${USE_HTTP:-1}
        - HTTP_PORT=${HTTP_PORT:-3010}
      command: ["/bin/sh", "bin/docker-start.sh"]
      restart: on-failure
      ports:
        - ${NODE_PORT}:${NODE_DOCKER_PORT}
        - ${HTTP_PORT:-3010}:${HTTP_PORT:-3010}
      healthcheck:
        test: ["CMD", "node", "-e", "const h=process.env.USE_HTTP==='1'||process.env.USE_HTTP==='true';const p=h?(process.env.NODE_PORT||3011):(process.env.HTTP_PORT||3010);fetch('http://127.0.0.1:'+p+'/').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))"]
        interval: 15s
        timeout: 5s
        retries: 8
        start_period: 180s
      working_dir: /app
      volumes:
        - ./nodeapp:/app
        - ./nodeapp/node_modules:/app/node_modules
        - ./frontend:/frontend
        - /frontend/node_modules
      depends_on:
        postgresql-db:
          condition: service_healthy
        mqtt-broker:
          condition: service_started
      stdin_open: true
      tty: true